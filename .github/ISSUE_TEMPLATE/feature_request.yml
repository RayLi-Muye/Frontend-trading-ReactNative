name: Feature request
description: Propose a user-facing product improvement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included, and what is out of scope?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: docs
    attributes:
      label: Documentation impact
      description: Which README, docs, ADR, or context files must change?
  - type: textarea
    id: validation
    attributes:
      label: Tests / verification
      description: Commands, screenshots, or live proof expected.
