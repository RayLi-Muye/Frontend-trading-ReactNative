name: Documentation
description: Improve repo documentation, guides, ADRs, or templates.
title: "docs: "
labels: ["documentation"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is missing, stale, ambiguous, or hard to find?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which docs should change, and what should remain out of scope?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Tests / verification
      description: Usually `git diff --check`; include app checks if code/config changes are included.
