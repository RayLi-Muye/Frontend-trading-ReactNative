name: Bug report
description: Report a reproducible defect.
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide steps, route, device/browser, and relevant data state.
      placeholder: |
        1. Open ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What should the fix include or explicitly avoid?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Tests / verification
      description: Commands, screenshots, or live proof expected for the fix.
      placeholder: |
        - npm run typecheck
        - npm run check:market-data
        - npm run export:web
  - type: textarea
    id: docs
    attributes:
      label: Documentation impact
      description: List docs that need updates, or write "None".
